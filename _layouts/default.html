<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <meta name="theme-color" content="#262220" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0e12" media="(prefers-color-scheme: dark)" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  {% include nav.html %}

  {% if page.url == "/" %}
  <div class="container">
    {% include sidebar.html %}

    <main class="main">
      {{ content }}
    </main>
  </div>
  {% else %}
  <div class="container-single">
    <main class="main">
      {{ content }}
    </main>
  </div>
  {% endif %}

  {% include footer.html %}
  <script>
    (function(){
      var btn = document.getElementById('theme-toggle');
      function effective(){
        var t = document.documentElement.getAttribute('data-theme');
        if (t) return t;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function updateIcon(){
        btn.textContent = effective() === 'dark' ? '☀' : '☽';
      }
      btn.addEventListener('click', function(){
        var next = effective() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon();
      });
      updateIcon();
    })();
  </script>
</body>
</html>

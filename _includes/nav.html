<nav class="topnav">
  <span class="brand"><a href="{{ '/' | relative_url }}">{{ site.author.name }}</a></span>
  <input type="checkbox" id="nav-toggle" class="nav-toggle">
  <label for="nav-toggle" class="nav-toggle-label" aria-label="Menu">☰</label>
  <div class="nav-links">
    {% for item in site.nav %}
    <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </div>
</nav>

<aside class="sidebar">
  <img class="avatar" src="{{ site.author.avatar | relative_url }}" alt="{{ site.author.name }}" />
  <div class="name">{{ site.author.name }}</div>
  <p class="subtitle">{{ site.author.tagline }}</p>

  <div class="kv">
    {% for aff in site.author.affiliations %}
    <span class="badge">{{ aff }}</span>
    {% endfor %}
  </div>

  <h3>Contact</h3>
  <ul class="follow">
    <li>✉️ <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a></li>
    {% for link in site.author.links %}
    <li>🔗 <a href="{{ link.url }}">{{ link.label }}</a></li>
    {% endfor %}
  </ul>
</aside>

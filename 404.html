<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found · Lichao Wu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fcfcfb;--ink:#1b1b1a;--muted:#6c6c66;--accent:#1f5673;
        --serif:"Newsreader",Georgia,serif;
        --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       display:flex;align-items:center;justify-content:center;text-align:center}
  .code{font-family:var(--mono);font-size:13px;letter-spacing:2px;color:var(--accent)}
  h1{font-family:var(--serif);font-weight:600;font-size:34px;margin:10px 0 6px}
  p{color:var(--muted);margin:0 0 18px}
  a{color:var(--accent)}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That page doesn’t exist.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
